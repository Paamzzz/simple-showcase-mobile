
<ion-content>
 <ion-card *ngIf="produto">
  <img [src]="produto.image"/>
  <ion-card-header>
    <ion-card-title>{{produto.title}}</ion-card-title>
    <ion-card-subtitle>{{produto.category}}</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    R$ {{ produto.price }} | ⭐ {{ produto.rating.rate }}
  </ion-card-content>
</ion-card>

<ion-button [disabled]="isFirst" (click)="anterior()">
  ← Anterior
</ion-button>
<ion-button [disabled]="isLast" (click)="proximo()">
  Próximo →
</ion-button>

</ion-content>
